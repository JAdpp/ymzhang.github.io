<header class="site-header">
  <div class="site-header__inner">
    <a class="site-title" href="{{ '/' | relative_url }}" aria-label="Yangming Zhang homepage">
      <span class="site-title__name">{{ site.author.name }}</span>
      <span class="site-title__role">{{ site.author.role }}</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
